<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block title %}GeoTravel{% endblock %}</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🌍 GeoTravel</a>
            <div class="navbar-nav ms-auto">
                {% if current_user.is_authenticated %}
                    <span class="nav-item nav-link text-light">Привет, {{ current_user.name }}!</span>
                    <a class="nav-link" href="/profile/{{ current_user.id }}">Профиль</a>
                    <a class="nav-link" href="/logout">Выход</a>
                {% else %}
                    <a class="nav-link" href="/login">Вход</a>
                    <a class="nav-link" href="/register">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
